services:
  network-api:
    build:
      context: ../network-api
    environment:
      SERVERCORE_API_KEY: ${SERVERCORE_API_KEY:-development-key}
      SERVERCORE_ALLOWED_ORIGINS: ${SERVERCORE_ALLOWED_ORIGINS:-http://localhost:8000}
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

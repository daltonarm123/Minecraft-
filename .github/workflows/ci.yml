name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  server-core:
    name: ServerCore Java
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: server-core
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle 9.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.1.0'

      - name: Test and build core
        run: gradle --no-daemon clean test build

      - name: Upload core reports and JAR
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-core-results
          path: |
            server-core/build/libs/*.jar
            server-core/build/reports/tests/test/**
          if-no-files-found: warn

  network-api:
    name: Network API
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: network-api
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: network-api/pyproject.toml

      - name: Install and test API
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'
          python -m compileall -q app tests
          python -m pytest -q

  neoforge:
    name: NeoForge 1.21.1 Adapter
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: servercore-neoforge
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle 9.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.1.0'

      - name: Build NeoForge mod
        env:
          CI: 'true'
        run: gradle --no-daemon clean build --stacktrace

      - name: Upload NeoForge JAR and reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: servercore-neoforge-1.21.1-results
          path: |
            servercore-neoforge/build/libs/*.jar
            servercore-neoforge/build/reports/**
          if-no-files-found: warn

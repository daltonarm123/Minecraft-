name: Validate Website

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate-website:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate JavaScript
        run: |
          node --check config.js
          node --check app.js

      - name: Verify required files
        run: |
          test -s index.html
          test -s styles.css
          test -s nginx.conf
          grep -q 'id="leaderboard-body"' index.html
          grep -q '/leaderboard' app.js

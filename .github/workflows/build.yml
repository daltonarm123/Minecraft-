name: Build ServerCore

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server-core

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test and build
        run: gradle clean test build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: server-core-build
          path: |
            server-core/build/libs/*.jar
            server-core/build/reports/tests/test/**
          if-no-files-found: error

name: Build ATM11 NeoForge Adapter

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-neoforge:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: servercore-neoforge

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build NeoForge mod
        shell: bash
        run: |
          set +e
          gradle --version > build.log 2>&1
          gradle clean build >> build.log 2>&1
          exit_code=$?
          cat build.log
          exit "$exit_code"

      - name: Upload diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: servercore-neoforge-diagnostics
          path: servercore-neoforge/build.log
          if-no-files-found: warn

      - name: Upload ServerCore mod JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: servercore-atm11
          path: servercore-neoforge/build/libs/*.jar
          if-no-files-found: error

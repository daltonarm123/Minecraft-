name: Build ATM11 NeoForge Adapter

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-neoforge:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: servercore-neoforge

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build NeoForge mod
        run: gradle clean build

      - name: Upload ServerCore mod JAR
        uses: actions/upload-artifact@v4
        with:
          name: servercore-atm11
          path: servercore-neoforge/build/libs/*.jar
          if-no-files-found: error
